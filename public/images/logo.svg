<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" fill="none">
  <!-- Blueprint grid lines -->
  <g stroke="#1a9fd4" stroke-width="0.75" opacity="0.35">
    <!-- Horizontal lines -->
    <line x1="80" y1="20" x2="490" y2="20"/>
    <line x1="80" y1="40" x2="490" y2="40"/>
    <line x1="60" y1="70" x2="490" y2="70"/>
    <line x1="60" y1="100" x2="490" y2="100"/>
    <line x1="60" y1="130" x2="490" y2="130"/>
    <line x1="60" y1="155" x2="490" y2="155"/>
    <line x1="60" y1="170" x2="490" y2="170"/>
    <!-- Vertical lines -->
    <line x1="100" y1="10" x2="100" y2="175"/>
    <line x1="130" y1="10" x2="130" y2="175"/>
    <line x1="160" y1="10" x2="160" y2="175"/>
    <line x1="190" y1="10" x2="190" y2="175"/>
    <line x1="220" y1="10" x2="220" y2="175"/>
    <line x1="250" y1="10" x2="250" y2="175"/>
    <line x1="280" y1="10" x2="280" y2="175"/>
    <line x1="310" y1="10" x2="310" y2="175"/>
    <line x1="340" y1="10" x2="340" y2="175"/>
    <line x1="370" y1="10" x2="370" y2="175"/>
    <line x1="400" y1="10" x2="400" y2="175"/>
    <line x1="430" y1="10" x2="430" y2="175"/>
    <line x1="460" y1="10" x2="460" y2="175"/>
    <line x1="490" y1="10" x2="490" y2="175"/>
  </g>
  <!-- Vertical bold line -->
  <line x1="80" y1="5" x2="80" y2="175" stroke="#1a9fd4" stroke-width="2" opacity="0.5"/>
  <!-- Horizontal bold line -->
  <line x1="60" y1="55" x2="495" y2="55" stroke="#1a9fd4" stroke-width="2" opacity="0.5"/>
  <!-- "the" text -->
  <text x="12" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-style="italic" fill="#1a9fd4" font-weight="400">the</text>
  <!-- "Blue" text -->
  <text x="10" y="125" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="95" fill="#1a9fd4" font-weight="900" letter-spacing="-2">Blue</text>
  <!-- "Print" text -->
  <text x="270" y="125" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="95" fill="#1a9fd4" font-weight="900" letter-spacing="-2">Print</text>
</svg>